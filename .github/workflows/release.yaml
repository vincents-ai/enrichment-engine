name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Download dependencies
        run: go mod download
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION=${GITHUB_REF_NAME}
          go build -ldflags "-s -w -X main.Version=${VERSION}" \
            -o enrich-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/enrich
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: enrich-${{ matrix.goos }}-${{ matrix.goarch }}
          path: enrich-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}

  publish:
    name: Create GitHub Release
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
