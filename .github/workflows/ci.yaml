name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.0
          args: --timeout=5m

  test:
    name: Test (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.24", "1.25"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Checkout vulnz-go
        uses: actions/checkout@v4
        with:
          repository: shift/vulnz
          path: ../vulnz-go
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Download dependencies
        run: go mod download
      - name: Unit tests
        run: go test -v -race -coverprofile=coverage.out ./pkg/...
      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"
          MIN_COVERAGE=90
          if (( $(echo "$COVERAGE < $MIN_COVERAGE" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below minimum threshold ${MIN_COVERAGE}%"
            exit 1
          fi
      - name: Upload coverage artifact
        if: matrix.go-version == '1.25'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7
      - name: Integration tests
        run: go test -v ./test/integration/...
      - name: Behavioral tests
        run: GODOG=1 go test -v ./test/behavioral/...
      - name: Verification tests
        run: go test -v -race -timeout 15m ./test/verification/...

  scenario:
    name: Scenario tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Checkout vulnz-go
        uses: actions/checkout@v4
        with:
          repository: shift/vulnz
          path: ../vulnz-go
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Download dependencies
        run: go mod download
      - name: Scenario / E2E tests
        run: go test -v -tags integration ./test/scenario/...

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Checkout vulnz-go
        uses: actions/checkout@v4
        with:
          repository: shift/vulnz
          path: ../vulnz-go
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build binary
        run: go build -ldflags "-s -w" -o bin/enrich ./cmd/enrich
